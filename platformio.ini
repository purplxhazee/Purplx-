; =============================================================================
; platformio.ini — Purplx (pure cyberdeck)
; Target: M5Stack Cardputer ADV (ESP32-S3, 8MB Flash, OPI PSRAM)
; m5stack-cores3 board (correct S3+PSRAM family), flash overridden to real 8MB.
; =============================================================================

[env:purplx]
platform  = espressif32@6.12.0
board     = m5stack-cores3
framework = arduino

board_upload.flash_size  = 8MB
board_build.flash_size   = 8MB
board_build.partitions   = partitions_8mb_launcher.csv

upload_speed    = 460800
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -fexceptions
    -Os
    -DPURPLX_VERSION=\"1.0.0\"
    -I include
    -I src

lib_deps =
    m5stack/M5Unified          @ ^0.2.11
    m5stack/M5Cardputer        @ ^1.1.1
    bblanchon/ArduinoJson      @ ^7.4.2
    ricmoo/QRCode              @ ^0.0.1
    SPI
    SD
    Wire
